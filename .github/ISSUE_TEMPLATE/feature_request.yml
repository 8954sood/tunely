name: "\U0001F680 Feature Request"
description: 새로운 기능을 제안합니다.
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        아래 항목을 작성해 주시면 검토에 도움이 됩니다.
  - type: textarea
    id: motivation
    attributes:
      label: 배경/동기
      description: 어떤 문제를 해결하려고 하나요?
      placeholder: 현재 불편한 점 또는 해결하고 싶은 상황을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 원하는 해결 방법을 구체적으로 설명해 주세요.
      placeholder: |
        - 원하는 동작:
        - 예상 사용 방식:
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 고려한 대안
      description: 다른 방법이나 우회책이 있었나요?
      placeholder: 시도해 본 대안이나 비교안을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: additional_context
    attributes:
      label: 추가 정보 (선택)
      description: 참고 링크, 목업, 스크린샷 등이 있으면 첨부해 주세요.
