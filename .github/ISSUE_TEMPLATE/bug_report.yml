name: "\U0001F41E Bug Report"
description: 버그를 제보합니다.
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        문제를 빠르게 파악할 수 있도록 아래 항목을 작성해 주세요.
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 방법
      description: 어떤 순서로 실행하면 문제가 발생하나요?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하나요?
      placeholder: 정상 동작 기대 내용을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: 실제 동작
      description: 실제로는 어떻게 동작했나요?
      placeholder: 발생한 오류/이상 동작을 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경 정보
      description: 문제를 재현한 실행 환경을 작성해 주세요.
      placeholder: |
        - OS:
        - 앱/CLI 버전:
        - Rust/Node/기타 런타임 버전:
        - 기타:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 로그/스크린샷 (선택)
      description: 오류 로그나 스크린샷이 있으면 첨부해 주세요.
